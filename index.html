<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Live music in the South West, UK and beyond" />
  <title>Fair Endeavours</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      color: #111111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .container {
      max-width: 380px;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .logo {
      display: block;
      width: 100%;
      height: auto;
    }

    .tagline {
      margin-top: 5rem;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 0.95rem;
      font-style: italic;
      line-height: 1.5;
      color: #111;
      letter-spacing: 0.01em;
    }

    .links {
      margin-top: 1.75rem;
      display: flex;
      align-items: center;
      gap: 0;
    }

    .links a {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-decoration: none;
      color: #111;
      text-transform: uppercase;
    }

    .links a:hover { opacity: 0.6; }

    .divider {
      width: 1px;
      height: 1.2em;
      background: #111;
      margin: 0 1rem;
    }

    .social {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    .social a {
      display: flex;
      align-items: center;
      color: #111;
      text-decoration: none;
    }

    .social a:hover { opacity: 0.6; }

    .social svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    @media (max-width: 480px) {
      .container { max-width: 100%; }
      .tagline { margin-top: 3rem; }
    }
  </style>
</head>
<body>
  <div class="container">

    <img class="logo" src="logo.png" alt="Fair Endeavours" />

    <p class="tagline">Purveyors of fine live music events across the UK since 2013</p>

    <div class="links">
      <a href="https://linktr.ee/fairendeavours" target="_blank" rel="noopener">Listings</a>
      <div class="divider"></div>
      <a href="mailto:fairendeavours@gmail.com">Contact</a>
      <div class="divider"></div>
      <div class="social">
        <!-- Facebook -->
        <a href="https://www.facebook.com/fairendeavours" target="_blank" rel="noopener" aria-label="Facebook">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 12c0-5.522-4.477-10-10-10S2 6.478 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.988H7.898V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/>
          </svg>
        </a>
        <!-- Instagram -->
        <a href="https://www.instagram.com/fairendeavours" target="_blank" rel="noopener" aria-label="Instagram">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
          </svg>
        </a>
      </div>
    </div>

  </div>
</body>
</html>
